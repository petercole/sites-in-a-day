<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6JMFKTJTJ5"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-6JMFKTJTJ5');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Website Intake | Sites In A Day</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a1a;
            --bg-secondary: #0f0f2a;
            --bg-card: #141432;
            --accent-blue: #4f7df5;
            --accent-purple: #8b5cf6;
            --accent-pink: #ec4899;
            --accent-green: #34d399;
            --text-primary: #ffffff;
            --text-secondary: #a0a0c0;
            --text-muted: #6b6b8a;
            --border-color: rgba(255,255,255,0.08);
            --gradient-primary: linear-gradient(135deg, #4f7df5 0%, #8b5cf6 50%, #ec4899 100%);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-secondary);
            min-height: 100vh;
        }
        .header {
            text-align: center;
            padding: 40px 20px 20px;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(135deg, #1a0533 0%, #0a1628 30%, #0d0d2b 60%, #1a0533 100%);
        }        .logo {
            font-size: 28px;
            font-weight: 800;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        .header p { color: var(--text-muted); font-size: 14px; }
        .container { max-width: 720px; margin: 0 auto; padding: 32px 20px 60px; }

        /* Payment confirmed banner */
        .confirmed-banner {
            background: linear-gradient(135deg, rgba(52,211,153,0.1), rgba(79,125,245,0.1));
            border: 1px solid rgba(52,211,153,0.3);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            margin-bottom: 32px;
        }
        .confirmed-banner h2 {
            color: var(--accent-green);
            font-size: 22px;
            margin-bottom: 8px;
        }
        .confirmed-banner p { color: var(--text-secondary); font-size: 15px; line-height: 1.6; }

        /* Error state */
        .error-banner {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 12px;
            padding: 32px;
            text-align: center;
        }
        .error-banner h2 { color: #ef4444; font-size: 22px; margin-bottom: 12px; }
        .error-banner p { color: var(--text-secondary); font-size: 15px; margin-bottom: 20px; }
        .error-banner a {
            display: inline-block;
            background: var(--gradient-primary);
            color: #fff;
            padding: 12px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
        }
        /* Form styles */
        .form-section { margin-bottom: 28px; }
        .form-section h3 {
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            color: var(--accent-purple);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-purple);
        }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .form-group select { cursor: pointer; }
        .form-group .hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        /* Checkbox grid */
        .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        @media (max-width: 600px) { .checkbox-grid { grid-template-columns: 1fr; } }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .checkbox-item:hover { border-color: var(--accent-purple); }
        .checkbox-item.checked {
            border-color: var(--accent-purple);
            background: rgba(139,92,246,0.1);
        }
        .checkbox-item input { display: none; }
        .check-box {
            width: 18px; height: 18px; border-radius: 4px;
            border: 2px solid var(--text-muted);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; flex-shrink: 0;
        }
        .checkbox-item.checked .check-box {
            background: var(--accent-purple);
            border-color: var(--accent-purple);
        }
        .check-box svg { display: none; }
        .checkbox-item.checked .check-box svg { display: block; }
        .checkbox-item span { color: var(--text-secondary); font-size: 14px; }

        /* Submit button */
        .submit-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: var(--gradient-primary);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 24px;
        }        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(139,92,246,0.4); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
        .form-msg {
            text-align: center;
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .form-msg.error { display: block; background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
        .form-msg.success { display: block; background: rgba(52,211,153,0.1); color: var(--accent-green); border: 1px solid rgba(52,211,153,0.3); }

        /* Success screen */
        .success-screen {
            text-align: center;
            padding: 60px 20px;
        }
        .success-screen .big-check {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px;
            font-size: 40px;
        }
        .success-screen h2 { color: var(--text-primary); font-size: 28px; margin-bottom: 12px; }
        .success-screen p { color: var(--text-secondary); font-size: 16px; line-height: 1.7; max-width: 480px; margin: 0 auto 8px; }

        .footer {
            text-align: center;
            padding: 24px;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">Sites In A Day</div>
        <p>Professional websites. Built in 24 hours.</p>
    </div>

    <div class="container" id="mainContent">
        <!-- Populated by JS -->
    </div>

    <div class="footer">&copy; 2026 Sites In A Day. All rights reserved. &middot; hello@sitesinaday.com</div>
    <script>
        const SUBMIT_URL = 'https://jpqeqjrrgyrkilonrhmx.supabase.co/functions/v1/submit-intake';
        const container = document.getElementById('mainContent');
        const params = new URLSearchParams(window.location.search);
        const sessionId = params.get('session_id');

        if (!sessionId) {
            container.innerHTML = `
                <div class="error-banner">
                    <h2>No Payment Found</h2>
                    <p>It looks like you haven't completed payment yet. Please select a package and pay first.</p>
                    <a href="https://www.sitesinaday.com/#pricing">Choose a Package</a>
                </div>`;
        } else {
            renderForm();
        }

        function renderForm() {
            container.innerHTML = `
                <div class="confirmed-banner">
                    <h2>&#10003; Payment Confirmed!</h2>
                    <p>Now tell us about your business so we can build the perfect website for you.<br>This takes about 3 minutes.</p>
                </div>

                <form id="intakeForm">
                    <div class="form-section">
                        <h3>Your Details</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="full_name">Full Name *</label>
                                <input type="text" id="full_name" name="full_name" placeholder="John Smith" required>
                            </div>
                            <div class="form-group">
                                <label for="phone">Phone Number</label>
                                <input type="tel" id="phone" name="phone" placeholder="(555) 123-4567">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="business_name">Business Name *</label>
                            <input type="text" id="business_name" name="business_name" placeholder="Your Business" required>
                        </div>
                    </div>
                    <div class="form-section">
                        <h3>About Your Business</h3>
                        <div class="form-group">
                            <label for="business_type">Business Type / Industry *</label>
                            <input type="text" id="business_type" name="business_type" placeholder="e.g. Photography, Restaurant, Consulting, Plumbing" required>
                        </div>
                        <div class="form-group">
                            <label for="target_audience">Who are your ideal customers?</label>
                            <textarea id="target_audience" name="target_audience" placeholder="e.g. Local homeowners aged 30-55, small business owners, brides-to-be..."></textarea>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3>Design Preferences</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="brand_colors">Preferred Colors</label>
                                <input type="text" id="brand_colors" name="brand_colors" placeholder="e.g. Navy blue, gold">
                                <div class="hint">Leave blank and we'll choose for you</div>
                            </div>
                            <div class="form-group">
                                <label for="has_logo">Do you have a logo?</label>
                                <select id="has_logo" name="has_logo">
                                    <option value="">Select...</option>
                                    <option value="yes">Yes, I'll provide it</option>
                                    <option value="no_design">No - please design one for me</option>
                                    <option value="no_later">No - I'll provide later</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group" id="logoNotesGroup" style="display:none;">
                            <label for="logo_notes">Logo notes</label>
                            <input type="text" id="logo_notes" name="logo_notes" placeholder="Any preferences for your logo?">
                        </div>
                        <div class="form-group">
                            <label for="inspiration_sites">Websites you love the look of</label>
                            <textarea id="inspiration_sites" name="inspiration_sites" placeholder="Paste URLs of websites whose style you like..."></textarea>
                        </div>
                    </div>
                    <div class="form-section">
                        <h3>Features You Need</h3>
                        <div class="checkbox-grid" id="featureGrid">
                            ${['Contact Form','Online Booking','Photo Gallery','Blog','Social Media Links','Testimonials','E-commerce / Shop','Live Chat'].map(f => `
                            <label class="checkbox-item" onclick="this.classList.toggle('checked')">
                                <input type="checkbox" name="features" value="${f}">
                                <div class="check-box"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6L5 9L10 3" stroke="white" stroke-width="2" stroke-linecap="round"/></svg></div>
                                <span>${f}</span>
                            </label>`).join('')}
                        </div>
                    </div>

                    <div class="form-section">
                        <h3>Content & Existing Assets</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="existing_website">Existing website URL</label>
                                <input type="text" id="existing_website" name="existing_website" placeholder="https://...">
                            </div>
                            <div class="form-group">
                                <label for="content_ready">Content readiness</label>
                                <select id="content_ready" name="content_ready">
                                    <option value="">Select...</option>
                                    <option value="ready">I have all content ready</option>
                                    <option value="some">I have some content</option>
                                    <option value="need_help">I need help with content</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="content_notes">Content notes</label>
                            <textarea id="content_notes" name="content_notes" placeholder="Any details about the content you have or need help with..."></textarea>
                        </div>
                        <div class="form-group">
                            <label for="social_media_links">Social media links</label>
                            <textarea id="social_media_links" name="social_media_links" placeholder="Instagram: @...\nFacebook: ...\nLinkedIn: ..."></textarea>
                        </div>
                    </div>
                    <div class="form-section">
                        <h3>Anything Else?</h3>
                        <div class="form-group">
                            <label for="additional_notes">Additional notes or special requests</label>
                            <textarea id="additional_notes" name="additional_notes" placeholder="Anything else we should know about your project..."></textarea>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">Submit & Start My Website &rarr;</button>
                    <div class="form-msg" id="formMsg"></div>
                </form>`;

            // Show/hide logo notes
            document.getElementById('has_logo').addEventListener('change', function() {
                document.getElementById('logoNotesGroup').style.display =
                    this.value === 'no_design' ? 'block' : 'none';
            });

            // Form submission
            document.getElementById('intakeForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                const btn = document.getElementById('submitBtn');
                const msg = document.getElementById('formMsg');
                btn.disabled = true;
                btn.textContent = 'Submitting...';
                msg.className = 'form-msg';

                const features = Array.from(document.querySelectorAll('input[name="features"]:checked'))
                    .map(cb => cb.value).join(', ');
                const logoSelect = document.getElementById('has_logo');
                const logoVal = logoSelect.value;
                let logoNotes = '';
                if (logoVal === 'yes') logoNotes = 'Yes, will provide';
                else if (logoVal === 'no_design') logoNotes = 'No - design one. ' + (document.getElementById('logo_notes').value || '');
                else if (logoVal === 'no_later') logoNotes = 'No - will provide later';

                const payload = {
                    session_id: sessionId,
                    full_name: document.getElementById('full_name').value,
                    phone: document.getElementById('phone').value || null,
                    business_name: document.getElementById('business_name').value,
                    business_type: document.getElementById('business_type').value,
                    target_audience: document.getElementById('target_audience').value || null,
                    brand_colors: document.getElementById('brand_colors').value || null,
                    has_logo: logoVal || null,
                    logo_notes: logoNotes || null,
                    inspiration_sites: document.getElementById('inspiration_sites').value || null,
                    must_have_features: features || null,
                    existing_website: document.getElementById('existing_website').value || null,
                    content_ready: document.getElementById('content_ready').value || null,
                    content_notes: document.getElementById('content_notes').value || null,
                    social_media_links: document.getElementById('social_media_links').value || null,
                    additional_notes: document.getElementById('additional_notes').value || null,
                };
                try {
                    const res = await fetch(SUBMIT_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload),
                    });
                    const result = await res.json();
                    if (!res.ok || !result.success) throw new Error(result.error || 'Submission failed');
                    showSuccess();
                } catch (err) {
                    msg.textContent = err.message || 'Something went wrong. Please try again.';
                    msg.className = 'form-msg error';
                    btn.disabled = false;
                    btn.textContent = 'Submit & Start My Website \u2192';
                }
            });
        }

        function showSuccess() {
            container.innerHTML = `
                <div class="success-screen">
                    <div class="big-check">&#10003;</div>
                    <h2>You're All Set!</h2>
                    <p>We've received your payment and project details. Our team is starting work on your website right now.</p>
                    <p style="color: var(--accent-green); font-weight: 600;">Check your email for a confirmation with next steps.</p>
                    <p style="margin-top: 24px; color: var(--text-muted); font-size: 14px;">Questions? Email us at <a href="mailto:hello@sitesinaday.com" style="color: var(--accent-blue); text-decoration: none;">hello@sitesinaday.com</a></p>
                </div>`;
        }
    </script>
</body>
</html>
